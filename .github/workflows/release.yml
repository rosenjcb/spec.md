# Publish npm + GitHub Release when a version tag is pushed (by changesets.yml on main).
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Publish npm and GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify publish targets
        run: pnpm run publish:check

      - name: Tests
        run: pnpm test

      - name: Read version
        id: meta
        shell: bash
        run: |
          VERSION="$(node -p "require('./cli/package.json').version")"
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog
        id: notes
        shell: bash
        run: |
          NOTES="$(node scripts/extract-changelog.mjs "${{ steps.meta.outputs.version }}")"
          {
            echo 'body<<EOF'
            if [ -n "$NOTES" ]; then
              echo "$NOTES"
            else
              echo "_No changelog entry for v${{ steps.meta.outputs.version }}._"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm publish
        run: pnpm run publish:check -- --check-npm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "@rosenjcb/spec-md v${{ steps.meta.outputs.version }}"
          body: |
            ## @rosenjcb/spec-md v${{ steps.meta.outputs.version }}

            ${{ steps.notes.outputs.body }}

            ### Install

            ```bash
            npm install --save-dev @rosenjcb/spec-md@${{ steps.meta.outputs.version }}
            npx @rosenjcb/spec-md check
            ```

            ```yaml
            - uses: rosenjcb/spec.md@${{ steps.meta.outputs.tag_name }}
            ```

            > **GitHub Action Marketplace:** automated releases do not check "Publish to Marketplace".
            > On the first release, open the release in GitHub and enable marketplace publishing manually.
            > See [RELEASING.md](https://github.com/rosenjcb/spec.md/blob/main/RELEASING.md).
          generate_release_notes: true
