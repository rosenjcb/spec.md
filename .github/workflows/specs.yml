name: specs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  spec-md:
    name: lint, test, and coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # The adapter files (Cursor/Windsurf/Cline/Copilot/AGENTS.md and the
      # plugin skill copy) are generated from SKILL.md. Fail if they drifted.
      - name: Adapters in sync with SKILL.md
        run: node scripts/sync-adapters.mjs --check

      - name: Publish target consistency
        run: npm run publish:check

      # The zero-dependency CLI test suite.
      - name: CLI tests
        run: node cli/test/run.js

      # Dogfood: validate this repo's own specs and their [TC-N] coverage.
      - name: Validate specs
        run: node cli/bin/spec-md.js check . --strict

  # Dedicated status check for branch protection. Version bump is applied on the
  # branch (`npm run changeset:version`), not after merge.
  changeset:
    name: Version bump required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Require an applied version bump for shipped changes
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node scripts/check-changeset-consistency.mjs --base "origin/$BASE_REF"
